<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRP Engine Console</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- Top bar -->
  <header id="topbar">
    <span class="logo">AIRP Engine Console</span>
    <span id="conn-status" class="status-dot dot-unknown"></span>
    <span id="conn-text">未连接</span>
    <label>Engine URL: <input id="engine-url" value="http://127.0.0.1:8000" /></label>
    <label>Bearer: <input id="bearer-token" type="password" placeholder="(空=无鉴权)" /></label>
    <button id="btn-connect">连接</button>
  </header>

  <!-- Three-panel body -->
  <div id="body">
    <!-- Left: character + session -->
    <aside id="left-panel">
      <section id="health-section">
        <h3>Engine</h3>
        <div id="health-info">—</div>
      </section>
      <section>
        <h3>Settings</h3>
        <pre id="settings-display" class="mono">—</pre>
      </section>
      <section>
        <h3>Models <button id="btn-refresh-models">reload</button></h3>
        <pre id="models-display" class="mono">-</pre>
      </section>
      <section>
        <h3>Characters <button id="btn-refresh-chars">↻</button></h3>
        <div id="char-avatar-row">
          <img id="char-avatar" alt="avatar" hidden />
          <select id="char-select" size="6"></select>
        </div>
      </section>
      <section>
        <h3>Sessions <button id="btn-new-session">+</button></h3>
        <select id="sess-select" size="6"></select>
      </section>
      <section id="state-section">
        <h3>State <button id="btn-refresh-state">↻</button></h3>
        <div class="hint">live.json（404 = 该角色尚未有 state）</div>
        <pre id="state-display" class="mono">—</pre>
        <h3 class="subhead">State History <label class="hint">limit: <input id="state-history-limit" type="number" value="20" min="1" max="1000" /></label></h3>
        <pre id="state-history-display" class="mono">—</pre>
      </section>
      <section>
        <h3>Import (M3)</h3>
        <input type="file" id="import-file" accept=".png,.json,.card" />
        <button id="btn-import">上传导入</button>
        <div id="import-result" class="hint">—</div>
      </section>
    </aside>

    <!-- Center: chat -->
    <main id="center-panel">
      <div id="chat-log"></div>
      <div id="chat-composer">
        <textarea id="chat-input" rows="3" placeholder="输入消息… (Ctrl+Enter 发送)"></textarea>
        <div id="chat-actions">
          <button id="btn-send">发送</button>
          <button id="btn-history">History</button>
          <button id="btn-regen">↻ Regenerate</button>
          <button id="btn-rollback">↩ Rollback</button>
        </div>
      </div>
      <hr />
      <div id="agent-runner">
        <h4>Agent Run <span id="agent-step-counter" class="hint"></span></h4>
        <textarea id="agent-input" rows="2" placeholder="输入 agent run 消息…">然后调 /v1/agent/run</textarea>
        <label class="inline-label">max_steps: <input id="agent-max-steps" type="number" value="3" min="1" max="20" /></label>
        <button id="btn-agent-run">Run</button>
        <button id="btn-agent-clear">清</button>
        <div id="agent-output">—</div>
      </div>
      <div id="concurrent-test">
        <h4>Concurrent Stream Test (M2)</h4>
        <div>两条并发 chat stream，验证 id-keyed state 不串扰：</div>
        <button id="btn-concurrent">启动两条并发流</button>
        <div id="concurrent-status" class="hint">—</div>
      </div>
      <div id="diagnostics">
        <h4>Diagnostics <button id="btn-diag">一键诊断</button> <button id="btn-diag-copy">复制摘要</button></h4>
        <pre id="diag-output" class="mono">—</pre>
      </div>
    </main>

    <!-- Right: event log / diagnostics -->
    <aside id="right-panel">
      <h3>Event Log <button id="btn-clear-log">清</button></h3>
      <div id="event-log"></div>
    </aside>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
