name: PR gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust workspace
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Prepare Tauri engine sidecar
        shell: pwsh
        run: |
          cargo build -p airp-core --bin airp-core --locked
          New-Item -ItemType Directory -Force ui/src-tauri/binaries | Out-Null
          Copy-Item target/debug/airp-core.exe ui/src-tauri/binaries/airp-core-x86_64-pc-windows-msvc.exe

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Workspace tests
        run: cargo test --workspace --locked

      - name: Sacred prompt-boundary invariants
        run: cargo test -p airp-core --lib subagent_ --locked -- --nocapture

  ui:
    name: UI and WebUI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Typecheck UI
        working-directory: ui
        run: npm run typecheck

      - name: Test UI
        working-directory: ui
        run: npm run test -- --run

      - name: Check WebUI scripts
        run: |
          node --check webui/persona-utils.js
          node --check webui/lorebook-utils.js
          node --check webui/app.js
          node --check webui/serve.js
          node --check webui/runtime-config.js
          node --test webui/tests/*.test.mjs
          node deploy/production/verify-config.mjs

  production-images:
    name: Production topology
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install browser smoke dependency
        working-directory: ui
        run: npm ci

      - name: Create synthetic deployment inputs
        working-directory: deploy/production
        run: |
          cp .env.example .env
          mkdir -p secrets
          printf '%s' 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA' > secrets/engine_access_key
          printf '%s' '$2a$14$A4V4qXU.6a8IYjvR8IXtA.2zRfn9czP3Vsl8ZLJ3YoK1vQKPTyphK' > secrets/admin_password_hash
          : > secrets/provider_api_key

      - name: Render Compose configuration
        working-directory: deploy/production
        run: docker compose --env-file .env -f compose.yaml config --quiet

      - name: Build pinned production images
        working-directory: deploy/production
        run: docker compose --env-file .env -f compose.yaml build --pull

      - name: Validate rendered Caddy configurations
        working-directory: deploy/production
        run: |
          for mode in public internal; do
            docker run --rm \
              -e AIRP_PUBLIC_ORIGIN=https://airp.example.com \
              -e AIRP_ADMIN_USER=airp-admin \
              -e AIRP_ADMIN_PASSWORD_HASH='$2a$14$A4V4qXU.6a8IYjvR8IXtA.2zRfn9czP3Vsl8ZLJ3YoK1vQKPTyphK' \
              -e AIRP_ACCESS_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA \
              -e AIRP_TLS_CERT_FILE=/run/airp-tls/fullchain.pem \
              -e AIRP_TLS_KEY_FILE=/run/airp-tls/privkey.pem \
              --entrypoint caddy airp-gateway:0.1.0 \
              validate --config "/etc/caddy/Caddyfile.$mode" --adapter caddyfile
          done
          docker run --rm \
            -e AIRP_PUBLIC_ORIGIN=https://airp.example.com \
            -e AIRP_ADMIN_USER=airp-admin \
            -e AIRP_ADMIN_PASSWORD_HASH='$2a$14$A4V4qXU.6a8IYjvR8IXtA.2zRfn9czP3Vsl8ZLJ3YoK1vQKPTyphK' \
            -e AIRP_ACCESS_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA \
            -e AIRP_TLS_CERT_FILE=/run/airp-tls/fullchain.pem \
            -e AIRP_TLS_KEY_FILE=/run/airp-tls/privkey.pem \
            --entrypoint caddy airp-gateway:0.1.0 \
            adapt --config /etc/caddy/Caddyfile.files --adapter caddyfile > /dev/null

      - name: Production HTTPS topology smoke
        run: bash deploy/production/smoke-ci.sh
