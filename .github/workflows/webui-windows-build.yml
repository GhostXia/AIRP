name: Windows WebUI package

on:
  workflow_dispatch:
  release:
    types: [published]
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "engine/**"
      - "webui/**"
      - "deploy/windows-webui/**"
      - "ui/local-webui-browser-smoke.mjs"
      - ".github/workflows/webui-windows-build.yml"

permissions:
  contents: read

jobs:
  package:
    name: Portable Windows WebUI
    runs-on: windows-latest
    env:
      RUSTUP_HOME: ${{ github.workspace }}\.ci\.rustup
      CARGO_HOME: ${{ github.workspace }}\.ci\.cargo
      npm_config_prefix: ${{ github.workspace }}\.ci\npm-global
      npm_config_cache: ${{ github.workspace }}\.ci\npm-cache
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: stable

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install browser smoke dependency
        working-directory: ui
        run: npm ci

      - name: Build portable WebUI package
        shell: pwsh
        run: .\deploy\windows-webui\build.ps1

      - name: Smoke packaged engine and real Chrome
        shell: pwsh
        run: .\deploy\windows-webui\smoke-package.ps1 -BrowserSmoke

      - name: Upload portable WebUI package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: airp-webui-windows-x64
          if-no-files-found: error
          path: dist/airp-webui-windows-x64.zip

  publish-release:
    name: Attach portable WebUI to release
    if: github.event_name == 'release'
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified portable package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: airp-webui-windows-x64
          path: release

      - name: Attach ZIP to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" release/airp-webui-windows-x64.zip --clobber
