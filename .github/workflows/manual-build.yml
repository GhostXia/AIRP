name: Manual build

on:
  workflow_dispatch:
    inputs:
      upload_release_artifacts:
        description: "Upload packaged desktop artifacts"
        required: true
        default: true
        type: boolean

jobs:
  windows:
    name: Windows desktop package
    runs-on: windows-latest
    env:
      RUSTUP_HOME: ${{ github.workspace }}\.ci\.rustup
      CARGO_HOME: ${{ github.workspace }}\.ci\.cargo
      npm_config_prefix: ${{ github.workspace }}\.ci\npm-global
      npm_config_cache: ${{ github.workspace }}\.ci\npm-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Build engine sidecar
        working-directory: ui
        shell: pwsh
        run: .\build-engine-sidecar.ps1

      - name: Verify Rust UI shell
        run: cargo test -p airp-ui

      - name: Verify frontend
        working-directory: ui
        run: |
          npm run typecheck
          npm run test -- --run

      - name: Build Windows package
        working-directory: ui
        shell: pwsh
        run: .\build-tauri.ps1

      - name: Smoke-test installed application and sidecar lifecycle
        working-directory: ui
        shell: pwsh
        run: .\smoke-windows-installer.ps1

      - name: Upload Windows artifacts
        if: ${{ inputs.upload_release_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: airp-ui-windows
          if-no-files-found: error
          path: |
            target/release/airp-ui.exe
            target/release/bundle/nsis/*.exe
