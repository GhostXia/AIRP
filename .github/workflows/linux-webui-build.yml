name: Linux WebUI package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Portable Linux WebUI (musl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo registry and git
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-musl-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-musl-cargo-

      - name: Cache cargo target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.3
        with:
          path: target
          key: ${{ runner.os }}-musl-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-musl-target-

      - name: Build portable WebUI package
        run: bash deploy/linux-webui/build.sh

      - name: Verify packaged engine
        run: |
          set -euo pipefail
          pkg="dist/airp-webui-linux-x64"
          # 1. Static linkage check (musl target default is crt-static).
          ldd "$pkg/airp-core" 2>&1 | \
            grep -qE "not a dynamic executable|statically linked"
          # 2. Engine help must execute on the CI runner.
          "$pkg/airp-core" --help >/dev/null
          # 3. Launcher syntax check.
          bash -n "$pkg/start-airp.sh"
          # 4. WebUI resources packaged.
          test -f "$pkg/webui/index.html"
          test -d "$pkg/webui/assets"
          test -d "$pkg/webui/screens"
          # 5. Licenses and README.
          test -f "$pkg/LICENSE-MIT"
          test -f "$pkg/LICENSE-APACHE"
          test -f "$pkg/README.txt"

      - name: Upload portable WebUI package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: airp-webui-linux-x64
          if-no-files-found: error
          path: dist/airp-webui-linux-x64.tar.gz
