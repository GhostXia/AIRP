<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>13 导入角色卡 · AIRP 控制台样板</title>
<link rel="stylesheet" href="../assets/tokens.css">
<link rel="stylesheet" href="../assets/base.css">
<link rel="stylesheet" href="../assets/components.css">
<style>
  .dropzone { border: 1.5px dashed var(--primary); background: var(--primary-tint); border-radius: var(--radius-card); padding: 26px 16px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .dropzone .dz-ico { font-size: 20px; color: var(--primary); }
  .dropzone .dz-t { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .dropzone .dz-d { font-size: 10px; color: var(--text-tertiary); }
  .parse-card { background: var(--bg-subtle); border-radius: var(--radius-input); padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
  .parse-card .p-t { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
  .parse-card .row { display: flex; justify-content: space-between; font-size: 11px; }
  .parse-card .k { color: var(--text-tertiary); }
  .parse-card .v { font-family: var(--font-mono); color: var(--text-primary); }
  .norm-report { background: var(--warning-tint); border-radius: var(--radius-input); padding: 12px 14px; font-size: 11px; color: var(--warning); display: flex; flex-direction: column; gap: 4px; }
  .norm-report .n-t { font-weight: 600; }
</style>
</head>
<body>
<div class="canvas">
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo-block">A</span>
      <span class="product-name">AIRP 控制台</span>
      <span class="topbar-divider"></span>
      <span class="crumb">角色列表 / 导入角色卡</span>
    </div>
    <div class="topbar-right">
      <span class="status-pill ok"><i class="dot"></i>引擎已连接</span>
    </div>
  </header>

  <div class="modal-mask">
    <div class="modal" style="width:560px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="m-title">导入角色卡</span>
        <span class="ico" style="color:var(--text-tertiary)">✕</span>
      </div>

      <div class="dropzone">
        <span class="dz-ico ico">⇓</span>
        <span class="dz-t">拖入 PNG 角色卡或 JSON 文件</span>
        <span class="dz-d">支持 TavernCardV2 全字段 · 或点击选择文件</span>
      </div>

      <div class="parse-card">
        <div class="p-t">解析结果</div>
        <div class="row"><span class="k">角色</span><span class="v">祁夜 · 雨城侦探（v2 卡）</span></div>
        <div class="row"><span class="k">内嵌世界书</span><span class="v">character_book · 9 条</span></div>
        <div class="row"><span class="k">备选开场白</span><span class="v">alt_greetings · 4 条</span></div>
      </div>

      <div class="norm-report">
        <span class="n-t">规范化报告</span>
        <span>· 已清理 BOM，原始输入已保留 sidecar</span>
        <span>· extensions.selective 已提升为 canonical 字段（3 条）</span>
        <span>· 2 个 advisory 字段将只读保留，不参与运行时</span>
      </div>

      <div class="m-actions">
        <button class="btn btn-secondary">取消</button>
        <button class="btn btn-primary">＋ 导入并创建</button>
      </div>
    </div>
  </div>
</div>
<script src="../assets/screens.js"></script>
<script src="../assets/app.js"></script>
</body>
</html>
