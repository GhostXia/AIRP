<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 通知与 Toast · AIRP 控制台样板</title>
<link rel="stylesheet" href="../assets/tokens.css">
<link rel="stylesheet" href="../assets/base.css">
<link rel="stylesheet" href="../assets/components.css">
<style>
  .sec-label { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); }
  .ntf-col { display: flex; flex-direction: column; gap: 12px; }
  .toast-zone { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 8px; }
</style>
</head>
<body>
<div class="canvas">
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo-block">A</span>
      <span class="product-name">AIRP 控制台</span>
      <span class="topbar-divider"></span>
      <span class="crumb">通用组件 / 通知与轻提示</span>
    </div>
    <div class="topbar-right">
      <span class="status-pill ok"><i class="dot"></i>引擎已连接</span>
    </div>
  </header>

  <main class="pane-main" style="gap:24px">
    <section class="ntf-col">
      <div class="sec-label">— Notification 持久通知（右上角，手动关闭）—</div>

      <div class="notification success">
        <span class="round-ico ok">✓</span>
        <div class="n-body">
          <span class="n-title">角色卡已保存</span>
          <span class="n-desc">艾拉 rev 19 已写入，current 指针已切换。</span>
        </div>
        <button type="button" class="n-close ico" aria-label="关闭通知">✕</button>
      </div>

      <div class="notification warn">
        <span class="round-ico warn">!</span>
        <div class="n-body">
          <span class="n-title">上游限流（429），已自动排队</span>
          <span class="n-desc">请求将在 20 秒后重试，无需操作。</span>
        </div>
        <button type="button" class="n-close ico" aria-label="关闭通知">✕</button>
      </div>

      <div class="notification danger">
        <span class="round-ico danger">×</span>
        <div class="n-body">
          <span class="n-title">会话写入失败</span>
          <span class="n-desc">磁盘不可写。本轮未提交任何更改，请检查数据根权限。</span>
        </div>
        <button type="button" class="n-close ico" aria-label="关闭通知">✕</button>
      </div>
    </section>

    <section class="toast-zone">
      <div class="sec-label">— Toast 轻提示（底部居中，3 秒自动消失）—</div>
      <div class="toast">
        <span class="ico" style="color:var(--success);font-size:13px">✓</span>
        <span>已复制到剪贴板</span>
      </div>
    </section>
  </main>
</div>
<script src="../assets/screens.js"></script>
<script src="../assets/app.js"></script>
</body>
</html>
