<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>06 用户人设 · AIRP 控制台样板</title>
<link rel="stylesheet" href="../assets/tokens.css">
<link rel="stylesheet" href="../assets/base.css">
<link rel="stylesheet" href="../assets/components.css">
<style>
  .resolve-flow { display: flex; align-items: stretch; gap: 10px; }
  .resolve-step { flex: 1; background: var(--bg-subtle); border-radius: var(--radius-input); padding: 12px; display: flex; flex-direction: column; gap: 2px; }
  .resolve-step.on { background: var(--primary-tint); }
  .resolve-step .rs-t { font-size: 12px; font-weight: 600; }
  .resolve-step.on .rs-t { color: var(--primary-strong); }
  .resolve-step .rs-d { font-size: 10px; color: var(--text-tertiary); }
  .resolve-arrow { align-self: center; color: var(--text-tertiary); }
  .bind-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
  .bind-row + .bind-row { border-top: 1px solid var(--border-default); }
  .bind-row .b-l { display: flex; align-items: center; gap: 8px; font-size: 12px; }
</style>
</head>
<body>
<div class="canvas">
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo-block">A</span>
      <span class="product-name">AIRP 控制台</span>
      <span class="topbar-divider"></span>
      <span class="crumb">用户人设 / 绑定与优先级</span>
    </div>
    <div class="topbar-right">
      <span class="status-pill ok"><i class="dot"></i>引擎已连接</span>
    </div>
  </header>

  <div class="screen-body">
    <aside class="pane-side wide">
      <div class="pane-label">人设列表</div>
      <button class="btn btn-secondary block">＋ 新建人设</button>
      <div class="pane-item active">
        <div class="pi-title">舰长·雷恩 <span class="tag tag-success" style="margin-left:auto">默认</span></div>
        <div class="pi-sub">绑定：艾拉（角色级）· rev 5</div>
      </div>
      <div class="pane-item">
        <div class="pi-title">流浪医师·苏</div>
        <div class="pi-sub">未绑定 · rev 2</div>
      </div>
      <div class="pane-item">
        <div class="pi-title">好奇学生·小鹿</div>
        <div class="pi-sub">绑定：会话「雨城夜谈」（会话级）</div>
      </div>
    </aside>

    <main class="pane-main">
      <div class="page-head">
        <div>
          <h1 class="t-title">舰长·雷恩</h1>
          <p class="t-sub">用户人设 · AI 以此理解「你是谁」· rev 5</p>
        </div>
        <div class="ph-actions">
          <button class="btn btn-primary">＋ 保存修改</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title" style="margin-bottom:12px"><span class="ico" style="color:var(--text-tertiary)">🔗</span> 激活解析顺序 <span class="t-mono" style="font-weight:400;color:var(--text-tertiary)">explicit → binding → default</span></div>
        <div class="resolve-flow">
          <div class="resolve-step">
            <span class="rs-t">① 显式选择</span>
            <span class="rs-d">未设置</span>
          </div>
          <span class="resolve-arrow">→</span>
          <div class="resolve-step on">
            <span class="rs-t">② 绑定（生效中）</span>
            <span class="rs-d">角色级 · 艾拉</span>
          </div>
          <span class="resolve-arrow">→</span>
          <div class="resolve-step">
            <span class="rs-t">③ 默认人设</span>
            <span class="rs-d">舰长·雷恩</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title" style="margin-bottom:4px">绑定管理</div>
        <div class="bind-row">
          <span class="b-l"><span class="ico" style="color:var(--text-tertiary)">⚑</span> 角色级绑定 → 艾拉</span>
          <button class="btn btn-secondary">解除绑定</button>
        </div>
        <div class="bind-row">
          <span class="b-l"><span class="ico" style="color:var(--text-tertiary)">◷</span> 会话级绑定 → 无（会话级优先于角色级）</span>
          <button class="btn btn-secondary">绑定到当前会话</button>
        </div>
      </div>

      <div class="field">
        <div class="field-note" style="align-items:baseline">
          <label class="field-label">人设描述（注入 system prompt）</label>
          <span>142 字</span>
        </div>
        <textarea class="textarea" rows="5">你是雷恩，退役第七舰队的舰长，艾拉曾是你的导航官。你说话沉稳、决策果断，习惯先听完整份侦察报告再下结论。你尊重艾拉的专业判断，偶尔会用舰队时代的称呼叫她「领航员」。</textarea>
      </div>
    </main>
  </div>
</div>
<script src="../assets/screens.js"></script>
<script src="../assets/app.js"></script>
</body>
</html>
