<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10 开场白 · AIRP 控制台样板</title>
<link rel="stylesheet" href="../assets/tokens.css">
<link rel="stylesheet" href="../assets/base.css">
<link rel="stylesheet" href="../assets/components.css">
<style>
  .work-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .form-zone { flex: 1; overflow-y: auto; padding: 24px 32px; display: flex; flex-direction: column; gap: 16px; }
  .ftree-group { font-size: 11px; font-weight: 500; letter-spacing: 1px; color: var(--text-tertiary); padding: 6px 4px 2px; }
  .ftree-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--radius-input); font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); }
  .ftree-item.active { background: var(--primary-tint); color: var(--primary-strong); font-weight: 600; }
  .greet-card { display: flex; align-items: center; gap: 12px; background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius-card); padding: 12px 14px; }
  .greet-num { width: 24px; height: 24px; flex: none; display: flex; align-items: center; justify-content: center; background: var(--bg-subtle); border-radius: var(--radius-pill); font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
  .greet-body { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .greet-text { font-size: 12px; color: var(--text-primary); }
  .greet-meta { font-size: 10px; color: var(--text-tertiary); }
</style>
</head>
<body>
<div class="canvas">
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo-block">A</span>
      <span class="product-name">AIRP 控制台</span>
      <span class="topbar-divider"></span>
      <span class="crumb">工作台 / 角色卡编辑 / 开场白</span>
    </div>
    <div class="topbar-right">
      <span class="status-pill ok"><i class="dot"></i>自动保存已开启</span>
    </div>
  </header>

  <div class="screen-body">
    <aside class="pane-side">
      <div class="ftree-group">角色卡</div>
      <div class="ftree-item active"><span class="ico" style="font-size:10px">◆</span>艾拉.character.json</div>
    </aside>

    <div class="work-col">
      <nav class="tabbar">
        <button class="tab">基础信息</button>
        <button class="tab">人格设定</button>
        <button class="tab active">开场白</button>
        <button class="tab">LLM 参数</button>
      </nav>
      <div class="form-zone">
        <div class="field">
          <div class="field-note" style="align-items:baseline">
            <label class="field-label">主开场白 <span class="t-mono" style="font-weight:400">first_mes</span> · 支持 {{user}} {{char}} 变量</label>
            <span>218 字</span>
          </div>
          <textarea class="textarea" rows="8">【舰桥 · 03:47 舰时】

警报灯把舰桥染成暗红色。艾拉的声音从导航台方向传来，平静得像在报天气：

「{{user}}，你来得正好。三点钟方向抓到一个信号，旧舰队制式 117.4MHz。我已经十几年没听过这个频率了。」

她转过身，指尖悬在星图上方，没有立刻放大那个区域——这是她说「这件事我拿不准」时的习惯动作。</textarea>
        </div>

        <div class="field">
          <div class="field-note" style="align-items:baseline">
            <label class="field-label">备选开场白 <span class="t-mono" style="font-weight:400">alt_greetings · 3 条</span></label>
            <button class="btn btn-secondary" style="height:26px;padding:0 10px">＋ 添加备选</button>
          </div>
          <div class="greet-card">
            <span class="greet-num">2</span>
            <div class="greet-body">
              <span class="greet-text">【维修舱】艾拉正把一块烧焦的导航板拆下来，头也没回：「工具箱第三层，帮我拿一下 6 号扳手。」</span>
              <span class="greet-meta">用于：二周目开场 · 96 字</span>
            </div>
            <button class="btn btn-secondary">编辑</button>
          </div>
          <div class="greet-card">
            <span class="greet-num">3</span>
            <div class="greet-body">
              <span class="greet-text">【观测甲板】「过来。」艾拉指着舷窗外的蓝色巨星，「它还有四百年才会塌缩，但我想让你现在就看一眼。」</span>
              <span class="greet-meta">用于：轻松向开场 · 88 字</span>
            </div>
            <button class="btn btn-secondary">编辑</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../assets/screens.js"></script>
<script src="../assets/app.js"></script>
</body>
</html>
